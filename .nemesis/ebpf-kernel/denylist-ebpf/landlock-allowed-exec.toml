# Paths que o processo sandboxed pode executar.
# Tudo fora desta lista receberá EACCES do kernel via Landlock.
allowed_exec = [
    "/usr/bin/node",
    "/usr/bin/devin",
    "/usr/bin/code",
    "/usr/bin/git",
    "/usr/bin/cargo",
    "/usr/bin/rustc",
    "/usr/bin/bun",
    "/usr/bin/bash",
    "/bin/bash",
    "/bin/sh",
    "/usr/bin/sh",
]
