name: Release Nemesis Binaries

# Dispara em tags v* (ex.: v2.0.0). Gera binários PRÉ-COMPILADOS do CORE cross-platform
# (mac arm64/x64, linux x64) + checksums, e sobe num GitHub Release (draft para revisão).
# A camada eBPF (Linux-only) NÃO entra no pacote: depende de libbpf/make e do objeto
# .bpf.o compatível com o kernel-alvo — é opt-in, construída da fonte por quem quiser.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # CORE apenas (pacotes nemesis + nemesis-defender + nemesis-doctor). NÃO compila
      # ebpf-kernel (Linux-only, exige libbpf e o make do .bpf.o).
      - name: Build core
        run: |
          cd .nemesis
          cargo build --release --target ${{ matrix.target }} \
            -p nemesis -p nemesis-defender -p nemesis-doctor

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          BIN=".nemesis/target/${{ matrix.target }}/release"
          PKG="nemesis-v2.0-${{ matrix.suffix }}"
          mkdir -p "$PKG/bin" "$PKG/denylist" "$PKG/nemesis-defender/config"

          # Binários do core (sem windows, sem eBPF)
          for b in nemesis-pretool-check nemesis-pretool-check-unix nemesis-pretool-hook \
                   nemesis-posttool-check-unix pre-edit-hook debug-hook-env nemesis-lsp \
                   nemesis-defender nemesis-doctor; do
            cp "$BIN/$b" "$PKG/bin/"
            strip "$PKG/bin/$b" 2>/dev/null || true
          done

          # Denylists + config (o defender/pretool carregam destes paths)
          cp -r .nemesis/denylist/. "$PKG/denylist/" 2>/dev/null || true
          cp .nemesis/nemesis-defender/config/denylist-defender.json "$PKG/nemesis-defender/config/"

          # Tarball: conteúdo na raiz (bin/, denylist/, nemesis-defender/config/).
          # O install.sh extrai isto para dentro de .nemesis/ do projeto-alvo.
          tar -czf "$PKG.tar.gz" -C "$PKG" .

          # Checksum (portável mac/linux)
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$PKG.tar.gz" > "$PKG.tar.gz.sha256"
          else
            shasum -a 256 "$PKG.tar.gz" > "$PKG.tar.gz.sha256"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          fail_on_unmatched_files: true
          files: |
            nemesis-v2.0-*.tar.gz
            nemesis-v2.0-*.sha256
